<svg width="375" height="812" viewBox="0 0 375 812" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="375" height="812" fill="#F8FAF5"/>
  
  <!-- Status Bar -->
  <rect width="375" height="44" fill="#4CAF50"/>
  <text x="187" y="30" text-anchor="middle" fill="white" font-family="Inter" font-size="14" font-weight="600">9:41 AM</text>
  
  <!-- Header -->
  <g transform="translate(0, 60)">
    <!-- Back Button -->
    <circle cx="32" cy="32" r="20" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <text x="32" y="38" text-anchor="middle" fill="#424242" font-family="Inter" font-size="20">←</text>
    
    <!-- AI Teacher Info -->
    <g transform="translate(70, 15)">
      <circle cx="20" cy="17" r="12" fill="#4CAF50"/>
      <text x="20" y="23" text-anchor="middle" fill="white" font-family="Inter" font-size="12" font-weight="700">🤖</text>
      <text x="40" y="12" fill="#1B5E20" font-family="Inter" font-size="14" font-weight="600">AI English Master</text>
      <text x="40" y="28" fill="#4CAF50" font-family="Inter" font-size="10">● Online</text>
    </g>
    
    <!-- Options -->
    <circle cx="343" cy="32" r="20" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <text x="343" y="38" text-anchor="middle" fill="#424242" font-family="Inter" font-size="20">⋯</text>
  </g>
  
  <!-- Chat Messages -->
  <g transform="translate(0, 120)">
    <!-- AI Welcome Message -->
    <g transform="translate(20, 0)">
      <circle cx="30" cy="20" r="16" fill="#4CAF50"/>
      <text x="30" y="26" text-anchor="middle" fill="white" font-family="Inter" font-size="14" font-weight="700">🤖</text>
      
      <rect x="56" y="0" width="280" height="80" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
      <text x="70" y="25" fill="#1B5E20" font-family="Inter" font-size="14" font-weight="600">Hello! I'm your AI English Teacher! 👋</text>
      <text x="70" y="45" fill="#424242" font-family="Inter" font-size="12">I'm here to help you learn English. What would</text>
      <text x="70" y="60" fill="#424242" font-family="Inter" font-size="12">you like to practice today?</text>
      <text x="70" y="75" fill="#757575" font-family="Inter" font-size="10">9:42 AM</text>
    </g>
    
    <!-- Quick Reply Options -->
    <g transform="translate(20, 100)">
      <text x="0" y="0" fill="#757575" font-family="Inter" font-size="12">Choose a topic:</text>
      
      <!-- Option 1 -->
      <rect x="0" y="15" width="155" height="40" rx="20" fill="#E8F5E8" stroke="#4CAF50" stroke-width="1"/>
      <text x="77" y="38" text-anchor="middle" fill="#2E7D32" font-family="Inter" font-size="12" font-weight="600">🗣️ Speaking Practice</text>
      
      <!-- Option 2 -->
      <rect x="165" y="15" width="155" height="40" rx="20" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
      <text x="242" y="38" text-anchor="middle" fill="#1565C0" font-family="Inter" font-size="12" font-weight="600">📝 Grammar Help</text>
      
      <!-- Option 3 -->
      <rect x="0" y="65" width="155" height="40" rx="20" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
      <text x="77" y="88" text-anchor="middle" fill="#E65100" font-family="Inter" font-size="12" font-weight="600">📚 Vocabulary</text>
      
      <!-- Option 4 -->
      <rect x="165" y="65" width="155" height="40" rx="20" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
      <text x="242" y="88" text-anchor="middle" fill="#6A1B9A" font-family="Inter" font-size="12" font-weight="600">✍️ Writing Practice</text>
    </g>
    
    <!-- User Message Example -->
    <g transform="translate(20, 230)">
      <rect x="120" y="0" width="235" height="60" rx="12" fill="#4CAF50"/>
      <text x="135" y="25" fill="white" font-family="Inter" font-size="14">I want to practice speaking about</text>
      <text x="135" y="45" fill="white" font-family="Inter" font-size="14">ordering food at a restaurant</text>
      <text x="340" y="55" text-anchor="end" fill="#E8F5E8" font-family="Inter" font-size="10">9:43 AM</text>
    </g>
    
    <!-- AI Response -->
    <g transform="translate(20, 305)">
      <circle cx="30" cy="40" r="16" fill="#4CAF50"/>
      <text x="30" y="46" text-anchor="middle" fill="white" font-family="Inter" font-size="14" font-weight="700">🤖</text>
      
      <rect x="56" y="0" width="280" height="120" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
      <text x="70" y="25" fill="#1B5E20" font-family="Inter" font-size="14" font-weight="600">Great choice! Let's practice! 🍽️</text>
      <text x="70" y="45" fill="#424242" font-family="Inter" font-size="12">Imagine you're at a restaurant. Here's a common</text>
      <text x="70" y="60" fill="#424242" font-family="Inter" font-size="12">phrase: "I'd like to order the steak, please."</text>
      <text x="70" y="80" fill="#424242" font-family="Inter" font-size="12">Now you try! What would you say if you wanted</text>
      <text x="70" y="95" fill="#424242" font-family="Inter" font-size="12">to order pasta?</text>
      <text x="70" y="115" fill="#757575" font-family="Inter" font-size="10">9:43 AM</text>
    </g>
    
    <!-- Typing Indicator -->
    <g transform="translate(20, 440)">
      <circle cx="30" cy="15" r="16" fill="#4CAF50"/>
      <text x="30" y="21" text-anchor="middle" fill="white" font-family="Inter" font-size="14" font-weight="700">🤖</text>
      
      <rect x="56" y="0" width="80" height="30" rx="15" fill="white" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="75" cy="15" r="3" fill="#757575"/>
      <circle cx="90" cy="15" r="3" fill="#757575"/>
      <circle cx="105" cy="15" r="3" fill="#757575"/>
    </g>
  </g>
  
  <!-- Input Area -->
  <g transform="translate(0, 680)">
    <rect width="375" height="132" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    
    <!-- Voice Button -->
    <circle cx="32" cy="50" r="20" fill="#E8F5E8" stroke="#4CAF50" stroke-width="1"/>
    <text x="32" y="56" text-anchor="middle" fill="#4CAF50" font-family="Inter" font-size="20">🎤</text>
    
    <!-- Input Field -->
    <rect x="64" y="30" width="247" height="40" rx="20" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
    <text x="80" y="53" fill="#9E9E9E" font-family="Inter" font-size="14">Type your message...</text>
    
    <!-- Send Button -->
    <circle cx="327" cy="50" r="20" fill="#4CAF50"/>
    <text x="327" y="56" text-anchor="middle" fill="white" font-family="Inter" font-size="16">→</text>
    
    <!-- Quick Actions -->
    <g transform="translate(20, 85)">
      <text x="0" y="0" fill="#757575" font-family="Inter" font-size="10">Quick actions:</text>
      <rect x="90" y="-10" width="60" height="20" rx="10" fill="#E8F5E8"/>
      <text x="120" y="3" text-anchor="middle" fill="#2E7D32" font-family="Inter" font-size="8" font-weight="600">Help</text>
      
      <rect x="160" y="-10" width="60" height="20" rx="10" fill="#E3F2FD"/>
      <text x="190" y="3" text-anchor="middle" fill="#1565C0" font-family="Inter" font-size="8" font-weight="600">Translate</text>
      
      <rect x="230" y="-10" width="60" height="20" rx="10" fill="#FFF3E0"/>
      <text x="260" y="3" text-anchor="middle" fill="#E65100" font-family="Inter" font-size="8" font-weight="600">Correct</text>
    </g>
  </g>
</svg>
