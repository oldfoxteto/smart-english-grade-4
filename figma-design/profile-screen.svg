<svg width="375" height="812" viewBox="0 0 375 812" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="375" height="812" fill="#F8FAF5"/>
  
  <!-- Status Bar -->
  <rect width="375" height="44" fill="#4CAF50"/>
  <text x="187" y="30" text-anchor="middle" fill="white" font-family="Inter" font-size="14" font-weight="600">9:41 AM</text>
  
  <!-- Header -->
  <g transform="translate(0, 60)">
    <!-- Settings Button -->
    <circle cx="32" cy="32" r="20" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <text x="32" y="38" text-anchor="middle" fill="#424242" font-family="Inter" font-size="20">⚙️</text>
    
    <!-- Title -->
    <text x="187" y="38" text-anchor="middle" fill="#1B5E20" font-family="Inter" font-size="20" font-weight="700">Profile</text>
    
    <!-- Edit Button -->
    <circle cx="343" cy="32" r="20" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <text x="343" y="38" text-anchor="middle" fill="#424242" font-family="Inter" font-size="20">✏️</text>
  </g>
  
  <!-- Profile Header -->
  <g transform="translate(20, 120)">
    <rect x="0" y="0" width="335" height="140" rx="16" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    
    <!-- Avatar -->
    <circle cx="60" cy="70" r="35" fill="#4CAF50"/>
    <text x="60" y="80" text-anchor="middle" fill="white" font-family="Inter" font-size="28" font-weight="700">A</text>
    
    <!-- User Info -->
    <g transform="translate(110, 30)">
      <text x="0" y="0" fill="#1B5E20" font-family="Inter" font-size="20" font-weight="700">Ahmed Ali</text>
      <text x="0" y="25" fill="#4CAF50" font-family="Inter" font-size="14" font-weight="600">Level A1 • Beginner</text>
      <text x="0" y="45" fill="#757575" font-family="Inter" font-size="12">Member since January 2024</text>
      <text x="0" y="65" fill="#757575" font-family="Inter" font-size="12">ahmed@email.com</text>
    </g>
    
    <!-- Level Badge -->
    <rect x="110" y="100" width="80" height="25" rx="12" fill="#4CAF50"/>
    <text x="150" y="117" text-anchor="middle" fill="white" font-family="Inter" font-size="12" font-weight="600">A1 Beginner</text>
  </g>
  
  <!-- Statistics -->
  <g transform="translate(20, 280)">
    <text x="0" y="0" fill="#1B5E20" font-family="Inter" font-size="16" font-weight="700">📊 Your Statistics</text>
    
    <!-- Stats Grid -->
    <g transform="translate(0, 20)">
      <!-- XP -->
      <rect x="0" y="0" width="100" height="80" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
      <text x="50" y="30" text-anchor="middle" fill="#4CAF50" font-family="Inter" font-size="24">🌟</text>
      <text x="50" y="50" text-anchor="middle" fill="#1B5E20" font-family="Inter" font-size="18" font-weight="700">0</text>
      <text x="50" y="65" text-anchor="middle" fill="#757575" font-family="Inter" font-size="10">XP Points</text>
      
      <!-- Streak -->
      <rect x="115" y="0" width="100" height="80" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
      <text x="165" y="30" text-anchor="middle" fill="#FF9800" font-family="Inter" font-size="24">🔥</text>
      <text x="165" y="50" text-anchor="middle" fill="#1B5E20" font-family="Inter" font-size="18" font-weight="700">0</text>
      <text x="165" y="65" text-anchor="middle" fill="#757575" font-family="Inter" font-size="10">Day Streak</text>
      
      <!-- Lessons -->
      <rect x="230" y="0" width="100" height="80" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
      <text x="280" y="30" text-anchor="middle" fill="#2196F3" font-family="Inter" font-size="24">📚</text>
      <text x="280" y="50" text-anchor="middle" fill="#1B5E20" font-family="Inter" font-size="18" font-weight="700">0</text>
      <text x="280" y="65" text-anchor="middle" fill="#757575" font-family="Inter" font-size="10">Lessons</text>
    </g>
  </g>
  
  <!-- Learning Goals -->
  <g transform="translate(20, 390)">
    <rect x="0" y="0" width="335" height="100" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    
    <text x="16" y="25" fill="#1B5E20" font-family="Inter" font-size="16" font-weight="700">🎯 Learning Goals</text>
    
    <g transform="translate(16, 40)">
      <text x="0" y="0" fill="#424242" font-family="Inter" font-size="12">Primary Goal:</text>
      <rect x="80" y="-10" width="60" height="20" rx="10" fill="#E8F5E8"/>
      <text x="110" y="3" text-anchor="middle" fill="#2E7D32" font-family="Inter" font-size="10" font-weight="600">Travel</text>
    </g>
    
    <g transform="translate(16, 65)">
      <text x="0" y="0" fill="#424242" font-family="Inter" font-size="12">Track:</text>
      <rect x="50" y="-10" width="80" height="20" rx="10" fill="#E3F2FD"/>
      <text x="90" y="3" text-anchor="middle" fill="#1565C0" font-family="Inter" font-size="10" font-weight="600">Travel English</text>
    </g>
  </g>
  
  <!-- Achievements -->
  <g transform="translate(20, 505)">
    <text x="0" y="0" fill="#1B5E20" font-family="Inter" font-size="16" font-weight="700">🏆 Recent Achievements</text>
    
    <!-- Achievement List -->
    <g transform="translate(0, 20)">
      <!-- Locked Achievement 1 -->
      <rect x="0" y="0" width="335" height="50" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="30" cy="25" r="15" fill="#E0E0E0"/>
      <text x="30" y="31" text-anchor="middle" fill="#757575" font-family="Inter" font-size="16">🔒</text>
      <text x="55" y="20" fill="#757575" font-family="Inter" font-size="12" font-weight="600">First Lesson</text>
      <text x="55" y="35" fill="#9E9E9E" font-family="Inter" font-size="10">Complete your first lesson</text>
      <text x="325" y="30" text-anchor="end" fill="#9E9E9E" font-family="Inter" font-size="10">+50 XP</text>
      
      <!-- Locked Achievement 2 -->
      <rect x="0" y="60" width="335" height="50" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
      <circle cx="30" cy="85" r="15" fill="#E0E0E0"/>
      <text x="30" y="91" text-anchor="middle" fill="#757575" font-family="Inter" font-size="16">🔒</text>
      <text x="55" y="80" fill="#757575" font-family="Inter" font-size="12" font-weight="600">Week Streak</text>
      <text x="55" y="95" fill="#9E9E9E" font-family="Inter" font-size="10">Study for 7 consecutive days</text>
      <text x="325" y="90" text-anchor="end" fill="#9E9E9E" font-family="Inter" font-size="10">+100 XP</text>
    </g>
  </g>
  
  <!-- Settings Options -->
  <g transform="translate(20, 640)">
    <rect x="0" y="0" width="335" height="120" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    
    <text x="16" y="25" fill="#1B5E20" font-family="Inter" font-size="16" font-weight="700">⚙️ Settings</text>
    
    <!-- Options -->
    <g transform="translate(16, 40)">
      <text x="0" y="0" fill="#424242" font-family="Inter" font-size="12">🔔 Notifications</text>
      <text x="300" y="0" text-anchor="end" fill="#757575" font-family="Inter" font-size="10">On</text>
    </g>
    
    <g transform="translate(16, 60)">
      <text x="0" y="0" fill="#424242" font-family="Inter" font-size="12">🌍 Language</text>
      <text x="300" y="0" text-anchor="end" fill="#757575" font-family="Inter" font-size="10">English</text>
    </g>
    
    <g transform="translate(16, 80)">
      <text x="0" y="0" fill="#424242" font-family="Inter" font-size="12">🎨 Theme</text>
      <text x="300" y="0" text-anchor="end" fill="#757575" font-family="Inter" font-size="10">Light</text>
    </g>
    
    <g transform="translate(16, 100)">
      <text x="0" y="0" fill="#424242" font-family="Inter" font-size="12">📊 Privacy</text>
      <text x="300" y="0" text-anchor="end" fill="#757575" font-family="Inter" font-size="10">→</text>
    </g>
  </g>
  
  <!-- Bottom Navigation -->
  <g transform="translate(0, 740)">
    <rect width="375" height="72" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    
    <!-- Home -->
    <g transform="translate(47, 16)">
      <text x="0" y="0" text-anchor="middle" fill="#9E9E9E" font-family="Inter" font-size="20">🏠</text>
      <text x="0" y="25" text-anchor="middle" fill="#9E9E9E" font-family="Inter" font-size="10">Home</text>
    </g>
    
    <!-- Lessons -->
    <g transform="translate(130, 16)">
      <text x="0" y="0" text-anchor="middle" fill="#9E9E9E" font-family="Inter" font-size="20">📚</text>
      <text x="0" y="25" text-anchor="middle" fill="#9E9E9E" font-family="Inter" font-size="10">Lessons</text>
    </g>
    
    <!-- Progress -->
    <g transform="translate(213, 16)">
      <text x="0" y="0" text-anchor="middle" fill="#9E9E9E" font-family="Inter" font-size="20">📊</text>
      <text x="0" y="25" text-anchor="middle" fill="#9E9E9E" font-family="Inter" font-size="10">Progress</text>
    </g>
    
    <!-- Profile -->
    <g transform="translate(296, 16)">
      <text x="0" y="0" text-anchor="middle" fill="#4CAF50" font-family="Inter" font-size="20">👤</text>
      <text x="0" y="25" text-anchor="middle" fill="#4CAF50" font-family="Inter" font-size="10" font-weight="600">Profile</text>
    </g>
  </g>
</svg>
