services:
  db:
    image: postgres:16
    container_name: lisan-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lisan
    ports:
      - "5433:5432"
    volumes:
      - lisan_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lisan"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lisan-backend
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lisan
      JWT_SECRET: change_this_to_a_long_secret
      JWT_REFRESH_SECRET: change_this_to_another_long_secret
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run dev"

volumes:
  lisan_db_data:
