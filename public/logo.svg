<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Smart English Grade 4 Logo -->
  <defs>
    <linearGradient id="bookCoverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Book Icon -->
  <g transform="rotate(-10 50 50)">
    <path d="M20,10 C10,10 10,90 20,90 L80,90 C90,90 90,10 80,10 L20,10 Z" fill="url(#bookCoverGradient)" />
    <path d="M25,15 L75,15 L75,85 L25,85 Z" fill="#FFFFFF"/>
    <rect x="30" y="25" width="40" height="5" fill="#E0E0E0" rx="2"/>
    <rect x="30" y="35" width="40" height="5" fill="#E0E0E0" rx="2"/>
    <rect x="30" y="45" width="40" height="5" fill="#E0E0E0" rx="2"/>
    <rect x="30" y="55" width="25" height="5" fill="#E0E0E0" rx="2"/>
  </g>

  <!-- Star Icon -->
  <g transform="translate(65, 5) rotate(15)">
    <path d="M15,0 L18.5,10.5 L29,10.5 L20,17.5 L23,28 L15,21 L7,28 L10,17.5 L1,10.5 L11.5,10.5 Z" fill="#F5A623"/>
  </g>
</svg>
