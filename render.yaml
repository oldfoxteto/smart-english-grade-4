services:
  - type: web
    name: beefluent-api
    runtime: node
    rootDir: server
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URLS
        value: https://beefluent.web.app,https://beefluent-7ae36.web.app,https://beefluent-2ce61.web.app,https://smart-english-grade-4.vercel.app
      - key: FIREBASE_PROJECT_ID
        value: beefluent
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_AI_STUDIO_API_KEY
        sync: false
      - key: GOOGLE_AI_STUDIO_MODEL
        value: gemini-2.5-flash
