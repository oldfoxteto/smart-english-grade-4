services:
  - type: web
    name: smart-english-api
    runtime: node
    rootDir: server
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URLS
        value: https://your-vercel-domain.vercel.app
      - key: OPENAI_API_KEY
        sync: false
