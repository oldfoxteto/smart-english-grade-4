name: Database Backup

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      target_env:
        description: "Environment to back up"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
          - development
      upload_to_s3:
        description: "Upload to S3"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Resolve target database URL
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: |
          TARGET_ENV="${{ github.event.inputs.target_env }}"
          if [ -z "$TARGET_ENV" ]; then
            TARGET_ENV="production"
          fi

          case "$TARGET_ENV" in
            production) DB_URL="$PROD_DATABASE_URL" ;;
            staging) DB_URL="$STAGING_DATABASE_URL" ;;
            development) DB_URL="$DEV_DATABASE_URL" ;;
            *)
              echo "::error::Unsupported target_env: $TARGET_ENV"
              exit 1
              ;;
          esac

          if [ -z "$DB_URL" ]; then
            echo "::error::Missing database URL secret for $TARGET_ENV."
            echo "::error::Set one of: PROD_DATABASE_URL, STAGING_DATABASE_URL, DEV_DATABASE_URL."
            exit 1
          fi

          echo "TARGET_ENV=$TARGET_ENV" >> "$GITHUB_ENV"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"
          echo "DB_BACKUP_DIR=./backups" >> "$GITHUB_ENV"
          echo "DB_BACKUP_FILE=lisan-${TARGET_ENV}-$(date +%Y%m%d-%H%M%S)-run${GITHUB_RUN_ID}.sql.gz" >> "$GITHUB_ENV"

      - name: Create DB backup
        run: npm run db:backup
        working-directory: backend

      - name: Confirm backup output
        run: |
          BACKUP_PATH="backend/backups/${DB_BACKUP_FILE}"
          if [ ! -f "$BACKUP_PATH" ]; then
            echo "::error::Backup file not found at $BACKUP_PATH"
            exit 1
          fi
          echo "BACKUP_PATH=$BACKUP_PATH" >> "$GITHUB_ENV"
          ls -lh "$BACKUP_PATH"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.TARGET_ENV }}-${{ github.run_id }}
          path: ${{ env.BACKUP_PATH }}
          retention-days: 14

      - name: Check S3 upload prerequisites
        id: s3-check
        env:
          REQUEST_UPLOAD: ${{ github.event.inputs.upload_to_s3 }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BACKUP_BUCKET: ${{ secrets.AWS_S3_BACKUP_BUCKET }}
        run: |
          if [ "$REQUEST_UPLOAD" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "S3 upload not requested."
            exit 0
          fi

          if [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ] && [ -n "$AWS_REGION" ] && [ -n "$AWS_S3_BACKUP_BUCKET" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::S3 upload requested but AWS secrets are missing. Skipping S3 upload."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.s3-check.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload backup to S3
        if: steps.s3-check.outputs.enabled == 'true'
        env:
          AWS_S3_BACKUP_BUCKET: ${{ secrets.AWS_S3_BACKUP_BUCKET }}
        run: |
          S3_PATH="db-backups/${TARGET_ENV}/$(date +%Y/%m/%d)/${DB_BACKUP_FILE}"
          aws s3 cp "$BACKUP_PATH" "s3://${AWS_S3_BACKUP_BUCKET}/${S3_PATH}" --storage-class STANDARD_IA
          echo "Uploaded backup to s3://${AWS_S3_BACKUP_BUCKET}/${S3_PATH}"
