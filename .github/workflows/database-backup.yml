# Database Backup Workflow
name: Database Backup

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Type of backup'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - incremental
      environment:
        description: 'Environment to backup'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

env:
  BACKUP_RETENTION_DAYS: 30
  S3_BUCKET: ${{ secrets.AWS_S3_BACKUP_BUCKET }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  backup:
    runs-on: ubuntu-latest
    name: Database Backup
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup AWS CLI
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Generate backup filename
      id: backup-filename
      run: |
        BACKUP_DATE=$(date +%Y-%m-%d)
        BACKUP_TIME=$(date +%H-%M-%S)
        BACKUP_TYPE=${{ github.event.inputs.backup_type || 'full' }}
        ENVIRONMENT=${{ github.event.inputs.environment || 'production' }}
        BACKUP_FILENAME="${ENVIRONMENT}_${BACKUP_TYPE}_${BACKUP_DATE}_${BACKUP_TIME}.sql"
        echo "backup_filename=$BACKUP_FILENAME" >> $GITHUB_OUTPUT
        
    - name: Create database backup
      run: |
        echo "Creating ${{ github.event.inputs.backup_type || 'full' }} backup for ${{ github.event.inputs.environment || 'production' }} environment..."
        echo "Backup filename: ${{ steps.backup-filename.outputs.backup_filename }}"
        
        # Database backup command
        if [ "${{ github.event.inputs.backup_type || 'full' }}" = "full" ]; then
          # Full backup
          mysqldump \
            --single-transaction \
            --routines \
            --triggers \
            --all-databases \
            --add-drop-database \
            --add-locks \
            --disable-keys \
            --extended-insert \
            --quick \
            --lock-tables=false \
            --set-gtid-purged=OFF \
            -h ${{ secrets.DB_HOST }} \
            -u ${{ secrets.DB_USER }} \
            -p${{ secrets.DB_PASSWORD }} \
            > ${{ steps.backup-filename.outputs.backup_filename }}
        else
          # Incremental backup
          mysqldump \
            --single-transaction \
            --routines \
            --triggers \
            --all-databases \
            --add-drop-database \
            --add-locks \
            --disable-keys \
            --extended-insert \
            --quick \
            --lock-tables=false \
            --set-gtid-purged=OFF \
            --incremental \
            -h ${{ secrets.DB_HOST }} \
            -u ${{ secrets.DB_USER }} \
            -p${{ secrets.DB_PASSWORD }} \
            > ${{ steps.backup-filename.outputs.backup_filename }}
        fi
        
        # Compress backup
        gzip ${{ steps.backup-filename.outputs.backup_filename }}
        
    - name: Upload backup to S3
      run: |
        echo "Uploading backup to S3..."
        
        # Create S3 path with date
        S3_PATH="backups/${{ github.event.inputs.environment || 'production' }}/$(date +%Y/%m/%d)/"
        
        # Upload compressed backup
        aws s3 cp ${{ steps.backup-filename.outputs.backup_filename }}.gz s3://${{ env.S3_BUCKET }}/${S3_PATH} --storage-class STANDARD_IA
        
        # Create backup metadata
        cat > backup_metadata.json << EOF
        {
          "backup_type": "${{ github.event.inputs.backup_type || 'full' }}",
          "environment": "${{ github.event.inputs.environment || 'production' }}",
          "filename": "${{ steps.backup-filename.outputs.backup_filename }}.gz",
          "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "size_bytes": "$(stat -c%s ${{ steps.backup-filename.outputs.backup_filename }}.gz)",
          "checksum": "$(sha256sum ${{ steps.backup-filename.outputs.backup_filename }}.gz | cut -d' ' -f1)",
          "database_host": "${{ secrets.DB_HOST }}",
          "database_name": "smart_english",
          "created_by": "GitHub Actions",
          "workflow_run_id": "${{ github.run_id }}",
          "repository": "${{ github.repository }}",
          "commit_sha": "${{ github.sha }}",
          "branch": "${{ github.ref_name }}"
        }
        EOF
        
        # Upload metadata
        aws s3 cp backup_metadata.json s3://${{ env.S3_BUCKET }}/${S3_PATH}metadata_${{ github.event.inputs.environment || 'production' }}_$(date +%Y-%m-%d).json
        
        echo "Backup uploaded successfully to s3://${{ env.S3_BUCKET }}/${S3_PATH}"
        
    - name: Verify backup integrity
      run: |
        echo "Verifying backup integrity..."
        
        # Download backup from S3
        aws s3 cp s3://${{ env.S3_BUCKET }}/${S3_PATH}${{ steps.backup-filename.outputs.backup_filename }}.gz ./
        
        # Verify checksum
        DOWNLOADED_CHECKSUM=$(sha256sum ${{ steps.backup-filename.outputs.backup_filename }}.gz | cut -d' ' -f1)
        ORIGINAL_CHECKSUM=$(cat backup_metadata.json | jq -r '.checksum')
        
        if [ "$DOWNLOADED_CHECKSUM" != "$ORIGINAL_CHECKSUM" ]; then
          echo "ERROR: Backup integrity check failed!"
          echo "Expected: $ORIGINAL_CHECKSUM"
          echo "Got: $DOWNLOADED_CHECKSUM"
          exit 1
        fi
        
        echo "Backup integrity verified successfully!"
        
    - name: Cleanup old backups
      run: |
        echo "Cleaning up old backups (keeping last ${{ env.BACKUP_RETENTION_DAYS }} days)..."
        
        # List and delete old backups
        aws s3 ls s3://${{ env.S3_BUCKET }}/backups/ --recursive | \
        while read -r line; do
          backup_date=$(echo $line | awk '{print $1}')
          backup_path=$(echo $line | awk '{print $4}')
          
          # Calculate days since backup
          backup_timestamp=$(date -d "$backup_date" +%s 2>/dev/null || echo 0)
          current_timestamp=$(date +%s)
          days_old=$(( (current_timestamp - backup_timestamp) / 86400 ))
          
          if [ $days_old -gt ${{ env.BACKUP_RETENTION_DAYS }} ]; then
            echo "Deleting old backup: $backup_path ($days_old days old)"
            aws s3 rm s3://${{ env.S3_BUCKET }}/$backup_path
          fi
        done
        
        # Also cleanup metadata files
        aws s3 ls s3://${{ env.S3_BUCKET }}/backups/ --recursive | \
        grep "metadata_" | \
        while read -r line; do
          backup_date=$(echo $line | awk '{print $1}')
          backup_path=$(echo $line | awk '{print $4}')
          
          # Extract date from metadata filename
          metadata_date=$(echo $backup_path | grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}')
          metadata_timestamp=$(date -d "$metadata_date" +%s 2>/dev/null || echo 0)
          current_timestamp=$(date +%s)
          days_old=$(( (current_timestamp - metadata_timestamp) / 86400 ))
          
          if [ $days_old -gt ${{ env.BACKUP_RETENTION_DAYS }} ]; then
            echo "Deleting old metadata: $backup_path ($days_old days old)"
            aws s3 rm s3://${{ env.S3_BUCKET }}/$backup_path
          fi
        done
        
    - name: Create backup report
      run: |
        echo "Creating backup report..."
        
        # Get backup statistics
        BACKUP_SIZE=$(stat -c%s ${{ steps.backup-filename.outputs.backup_filename }}.gz)
        BACKUP_COUNT=$(aws s3 ls s3://${{ env.S3_BUCKET }}/backups/${{ github.event.inputs.environment || 'production' }}/ --recursive | wc -l)
        
        cat > backup_report.md << EOF
        # Database Backup Report
        
        ## Backup Information
        - **Type**: ${{ github.event.inputs.backup_type || 'full' }}
        - **Environment**: ${{ github.event.inputs.environment || 'production' }}
        - **Filename**: ${{ steps.backup-filename.outputs.backup_filename }}.gz
        - **Size**: $BACKUP_SIZE bytes
        - **Created**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
        - **Total Backups**: $BACKUP_COUNT
        
        ## Backup Location
        - **S3 Bucket**: ${{ env.S3_BUCKET }}
        - **Path**: backups/${{ github.event.inputs.environment || 'production' }}/$(date +%Y/%m/%d)/
        
        ## Backup Verification
        - ✅ Backup created successfully
        - ✅ Uploaded to S3
        - ✅ Integrity verified
        - ✅ Old backups cleaned up
        
        ## Repository Information
        - **Repository**: ${{ github.repository }}
        - **Commit**: ${{ github.sha }}
        - **Branch**: ${{ github.ref_name }}
        - **Workflow**: ${{ github.workflow }}
        - **Run ID**: ${{ github.run_id }}
        
        ## Next Steps
        - Monitor backup storage usage
        - Verify backup restoration process
        - Update backup retention policy if needed
        
        ---
        *Report generated on $(date -u +%Y-%m-%dT%H:%M:%SZ)*
        EOF
        
        echo "Backup report created"
        
    - name: Upload backup report
      uses: actions/upload-artifact@v3
      with:
        name: backup-report
        path: backup_report.md
        retention-days: 30
        
    - name: Send notification
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#backups'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        message: |
          🗄️ Database Backup
          Status: ${{ job.status }}
          Type: ${{ github.event.inputs.backup_type || 'full' }}
          Environment: ${{ github.event.inputs.environment || 'production' }}
          Size: $BACKUP_SIZE
          Total Backups: $BACKUP_COUNT
          Commit: ${{ github.sha }}
          Run: ${{ github.run_id }}
          
          ${{ job.status == 'success' && '✅ Backup completed successfully!' || '❌ Backup failed!' }}
        
    - name: Update backup metrics
      run: |
        echo "Updating backup metrics..."
        
        # Update backup metrics in monitoring system
        curl -X POST \
          -H "Content-Type: application/json" \
          -d '{
            "backup_type": "${{ github.event.inputs.backup_type || 'full' }}",
            "environment": "${{ github.event.inputs.environment || 'production' }}",
            "size_bytes": '$BACKUP_SIZE',
            "status": "success",
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "total_backups": '$BACKUP_COUNT'
          }' \
          ${{ secrets.MONITORING_WEBHOOK_URL }}/backup-metrics || true

  # Backup Restoration Test
  test-restore:
    runs-on: ubuntu-latest
    name: Test Backup Restoration
    needs: backup
    if: github.event.inputs.backup_type == 'full'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup AWS CLI
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Download latest backup
      run: |
        echo "Downloading latest backup for restoration test..."
        
        # Get latest backup
        LATEST_BACKUP=$(aws s3 ls s3://${{ env.S3_BUCKET }}/backups/${{ github.event.inputs.environment || 'production' }}/ --recursive | sort -r | head -1 | awk '{print $4}')
        echo "Latest backup: $LATEST_BACKUP"
        
        # Download backup
        aws s3 cp s3://${{ env.S3_BUCKET }}/$LATEST_BACKUP ./test-backup.sql.gz
        gunzip ./test-backup.sql.gz
        
    - name: Test restoration
      run: |
        echo "Testing backup restoration..."
        
        # Create test database
        mysql -h ${{ secrets.DB_TEST_HOST }} -u ${{ secrets.DB_TEST_USER }} -p${{ secrets.DB_TEST_PASSWORD }} -e "CREATE DATABASE IF NOT EXISTS test_restore;"
        
        # Restore backup to test database
        mysql -h ${{ secrets.DB_TEST_HOST }} -u ${{ secrets.DB_TEST_USER }} -p${{ secrets.DB_TEST_PASSWORD }} test_restore < ./test-backup.sql
        
        # Verify restoration
        TABLE_COUNT=$(mysql -h ${{ secrets.DB_TEST_HOST }} -u ${{ secrets.DB_TEST_USER }} -p${{ secrets.DB_TEST_PASSWORD }} test_restore -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'test_restore';")
        
        echo "Restored $TABLE_COUNT tables successfully!"
        
        # Clean up test database
        mysql -h ${{ secrets.DB_TEST_HOST }} -u ${{ secrets.DB_TEST_USER }} -p${{ secrets.DB_TEST_PASSWORD }} -e "DROP DATABASE IF EXISTS test_restore;"
        
        echo "Backup restoration test completed successfully!"
        
    - name: Send test notification
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#backups'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        message: |
          🧪 Backup Restoration Test
          Status: ${{ job.status }}
          Environment: ${{ github.event.inputs.environment || 'production' }}
          Tables Restored: $TABLE_COUNT
          Commit: ${{ github.sha }}
          Run: ${{ github.run_id }}
          
          ${{ job.status == 'success' && '✅ Restoration test passed!' || '❌ Restoration test failed!' }}
