# Monitoring and Observability Setup
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    name: monitoring
    purpose: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: production
        region: us-west-2
      rule_files:
        - "/etc/prometheus/rules/*.yml"
      scrape_configs:
        - job_name: 'kubernetes-apis'
          kubernetes_sd_configs:
            - role: endpoints
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name]
              target_label: service
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_endpoint_name]
              target_label: endpoint
            - source_labels: [__meta_kubernetes_endpoint_port]
              target_label: port
        - job_name: 'kubernetes-nodes'
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - source_labels: [__meta_kubernetes_node_name]
              target_label: node
            - source_labels: [__meta_kubernetes_node_label_kubernetes_io_hostname]
              target_label: hostname
        - job_name: 'kubernetes-pods'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_label_app]
              target_label: app
            - source_labels: [__meta_kubernetes_pod_label_component]
              target_label: component
        - job_name: 'smart-english-frontend'
          static_configs:
            - targets:
              - targets:
                - 'smart-english-frontend-service:80'
                  - 'smart-english-frontend-service:80'
                  - 'smart-english-frontend-service:80'
          metrics_path: /metrics
          scrape_interval: 30s
          scrape_timeout: 10s
          relabel_configs:
            - source_labels: [__address__]
              target_label: instance
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_namespace]
              target_label: namespace
        - job_name: 'nginx-ingress-controller'
          kubernetes_sd_configs:
            - role: endpoints
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name]
              target_label: service
            - source_labels: [__meta_kubernetes_endpoint_port]
              target_label: port
            - source_labels: [__meta_kubernetes_endpoint_scheme]
              target_label: scheme
          metrics_path: /metrics
          scrape_interval: 30s
    rule_files:
      - "smart-english-alerts.yml"
      alerting:
        alertmanagers:
          - slack_webhook:
            api_url: ${{ secrets.SLACK_WEBHOOK_URL }}
            channel: '#alerts'
            send_resolved: true
            send_failure: true
            title: 'Smart English Alert'
            text: '{{ range .Alerts.Firing }} alert(s) firing'
        - email:
          to: ${{ secrets.ALERT_EMAIL }}
          from: ${{ secrets.SMTP_FROM }}
          smt_host: ${{ secrets.SMTP_HOST }}
          smt_port: ${{ secrets.SMTP_PORT }}
          smt_username: ${{ secrets.SMTP_USERNAME }}
          smt_password: $---
          send_resolved: true
          send_failure: true
          title: 'Smart English Alert'
          text: '{{ range .Alerts.Firing }} alert(s) firing'
      alert_rules:
        - alert: HighErrorRate
          expr: rate(http_requests_total{job="smart-nginx"}[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value | humanizePercentage }} for job smart-nginx"
        - alert: HighLatency
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="smart-nginx"}[5m])) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High latency detected"
            description: "95th percentile latency is {{ $value }}s for job smart-nginx"
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="production",pod=~"smart-english-frontend"}[5m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod crash looping detected"
            description: "Pod {{ $labels.pod }} is restarting frequently"
        - alert: MemoryUsageHigh
          expr: container_memory_usage_bytes{namespace="production",pod=~"smart-english-frontend",container="frontend"} / container_spec_memory_limit_bytes > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage detected"
            description: "Memory usage is {{ $value | humanizePercentage }} for pod {{ $labels.pod }}"
        - alert: CPUUsageHigh
          expr: rate(container_cpu_usage_seconds_total{namespace="production",pod=~"smart-english-frontend",container="frontend"}[5m]) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage detected"
            description: "CPU usage is {{ $value | humanizePercentage }} for pod {{ $labels.pod }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app: grafana
data:
  smart-english-overview.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Smart English Overview",
        "tags": ["smart-english", "overview"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Request Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(http_requests_total{job=\"smart-nginx\"}[5m])",
                "legendFormat": "{{job}} - {{method}}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 0,
              "y": 0
            }
          },
          {
            "id": 2,
            "title": "Response Time",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=\"smart-nginx\"}[5m]))",
                "legendFormat": "95th percentile"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 12,
              "y": 0
            }
          },
          {
            "id": 3,
            "title": "Error Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(http_requests_total{job=\"smart-nginx\",status!=\"200\"}[5m])",
                "legendFormat": "{{job}} - {{status}}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 0,
              "y": 8
            }
          },
          {
            "id": 4,
            "title": "Memory Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "container_memory_usage_bytes{namespace=\"production\",pod=~\"smart-english-frontend\",container=\"frontend\"} / container_spec_memory_limit_bytes",
                "legendFormat": "{{pod}}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 12,
              "y": 8
            }
          }
        ]
      }
    }
  smart-english-detailed.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Smart English Detailed",
        "tags": ["smart-english", "detailed"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Request Rate by Path",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(http_requests_total{job=\"smart-nginx\"}[5m])",
                "legendFormat": "{{method}} {{path}}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 0,
              "y": 0
            }
          },
          {
            "id": 2,
            "title": "Response Time by Path",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=\"smart-nginx\"}[5m]))",
                "legendFormat": "95th percentile - {{path}}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 12,
              "y": 0
            }
          },
          {
            "id": 3,
            "title": "Error Rate by Status",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(http_requests_total{job=\"smart-nginx\",status!=\"200\"}[5m])",
                "legendFormat": "{{status}} - {{path}}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 0,
              "y": 8
            }
          },
          {
            "id": 4,
            "title": "Memory Usage by Pod",
            "type": "graph",
            "targets": [
              {
                "expr": "container_memory_usage_bytes{namespace=\"production\",pod=~\"smart-english-frontend\",container=\"frontend\"} / container_spec_memory_limit_bytes",
                "legendFormat": "{{pod}}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 12,
              "y": 8
            }
          },
          {
            "id": 5,
            "title": "CPU Usage by Pod",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(container_cpu_usage_seconds_total{namespace=\"production\",pod=~\"smart-english-frontend\",container=\"frontend\"}[5m])",
                "legendFormat": "{{pod}}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 0,
              "y": 16
            }
          }
        ]
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
      component: server
  template:
    metadata:
      labels:
        app: prometheus
        component: server
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v2.45.0
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--web.console.libraries=/usr/share/prometheus/console_libraries'
          - '--web.console.templates=/usr/share/prometheus/consoles'
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: prometheus-config-volume
          mountPath: /etc/prometheus
        - name: prometheus-storage-volume
          mountPath: /prometheus
        resources:
          requests:
            memory: 400Mi
            cpu: 200m
          limits:
            memory: 800Mi
            cpu: 400m
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: prometheus-config-volume
        configMap:
          name: prometheus-config
      - name: prometheus-storage-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
    component: server
spec:
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    matchLabels:
      app: prometheus
      component: server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
      component: server
  template:
    metadata:
      labels:
        app: grafana
        component: server
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.0.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_INSTALL_PLUGINS
          value: "grafana-piechart-panel,grafana-worldmap-panel"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: Viewer
        - name: GF_AUTH_ORG_ROLE
          value: Viewer
        volumeMounts:
        - name: grafana-dashboards
          mountPath: /etc/grafana/provisioning/dashboards
        - name: grafana-storage
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: 200Mi
            cpu: 100m
          limits:
            memory: 400Mi
            cpu: 200m
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: grafana-dashboards
        configMap:
          name: grafana-dashboards
      - name: grafana-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
    component: server
spec:
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    matchLabels:
      app: grafana
      component: server
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
  labels:
    app: prometheus
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
  labels:
    app: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: monitoring
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  selector:
      matchLabels:
        app: prometheus
  endpoints:
  - port: 9090
    path: /metrics
    interval: 30s
    timeout: 10s
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  selector:
      matchLabels:
        app: grafana
  endpoints:
  - port: 3000
    path: /api/metrics
    interval: 30s
    timeout: 10s
---
apiVersion: v1
kind: PodMonitor
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  selector:
      matchLabels:
        app: prometheus
  podMetricsEndpoints:
  - targetPort: 9090
    path: /metrics
    interval: 30s
    timeout: 10s
---
apiVersion: v1
kind: PodMonitor
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  selector:
      matchLabels:
        app: grafana
  podMetricsEndpoints:
  - targetPort: 3000
    path: /api/metrics
    interval: 30s
    timeout: 10s
---
apiVersion: v1
kind: Ingress
metadata:
  name: prometheus-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
  - hosts:
    - prometheus.smart-english-grade-4.com
    secretName: prometheus-tls
  rules:
  - host: prometheus.smart-english-grade-4.com
    http:
      paths:
      - path: /
        backend:
          service:
            name: prometheus
            port:
              number: 9090
---
apiVersion: v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
  - hosts:
    - grafana.smart-english-grade-4.com
    secretName: grafana-tls
  rules:
  - host: grafana.smart-english-grade-4.com
    http:
      paths:
      - path: /
        backend:
          service:
            name: grafana
            port:
              number: 3000
---
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-tls
  namespace: monitoring
type: Opaque
data:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    # Your TLS certificate here
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    # Your TLS private key here
    -----END PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-tls
  namespace: monitoring
type: Opaque
data:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    # Your TLS certificate here
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    # Your TLS private key here
    -----END PRIVATE KEY-----
