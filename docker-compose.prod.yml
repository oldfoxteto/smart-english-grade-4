services:
  db:
    image: postgres:16
    container_name: lisan-db-prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lisan_prod
    volumes:
      - lisan_db_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lisan_prod"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/lisan-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: lisan-backend-prod
    restart: always
    env_file:
      - backend/.env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/lisan_prod
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  lisan_db_prod_data:
